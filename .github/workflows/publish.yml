name: Publish to npm
on:
  release:
    types: published
  workflow_dispatch:
    inputs:
      version:
        description: Version to publish
        required: true
        default: "1.0.0"
jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Debug - list files
        run: |
          echo "=== Files ==="
          find . -type f | head -50
          echo ""
          echo "=== Package.json ==="
          cat package.json 2>/dev/null || echo "Not found"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: https://registry.npmjs.org
      - name: Publish
        run: |
          echo "=== Auth test ==="
          npm whoami || echo "Not logged in"
          echo ""
          echo "=== Publishing ==="
          npm publish --access public 2>&1
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
